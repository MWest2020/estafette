conclusion: >-
  A CLI that mechanically assesses whether a proof of concept is transferable
  (REUSE, licence consistency, secrets, SBOM vs declared deps, manifest) and
  emits a byte-reproducible report with a bronze verdict, plus an informational
  silver preview from a rootless-podman build harness. Dogfooding it on itself
  reached bronze and surfaced (then fixed) real bugs in the licence and
  dependency checks. Verdict is a bonus; the point is sharing the PoC.
